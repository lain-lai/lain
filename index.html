<!DOCTYPE html>
<!-- 文档类型声明，告诉浏览器使用HTML5标准解析页面 -->
<html lang="zh-CN">
<!-- 根元素，lang="zh-CN" 表示页面语言为简体中文 -->
<head>
    <!-- 头部区域：包含页面的元数据，不会直接显示在页面上 -->
    <meta charset="UTF-8">
    <!-- 字符编码设置为UTF-8，确保中文正常显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 视口设置，适配移动端设备，初始缩放比例为1.0 -->
    <title>GitHub</title>
    <!-- 页面标题，显示在浏览器标签页上 -->
    <link rel="stylesheet" href="style.css">
    <!-- 引入外部CSS样式表，控制页面外观 -->
</head>
<body>
    <!-- 主体区域：页面上所有可见内容都放在这里 -->

    <p class="text">GitHub</p>

</body>
</html>
<!-- 页面结束 -->
