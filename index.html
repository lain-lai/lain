<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模拟ATM存取款管理系统</title>
<style>
/* ========== 全局 ========== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;align-items:center;justify-content:center}
.hidden{display:none!important}

/* ========== 登录页 ========== */
#loginPage{width:440px;background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);border-radius:16px;padding:36px 40px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
#loginPage .logo{text-align:center;color:#e94560;font-size:26px;font-weight:bold;margin-bottom:4px}
#loginPage .subtitle{text-align:center;color:#8899aa;font-size:13px;margin-bottom:24px}
#loginPage .field-label{display:block;color:#8899bb;font-size:13px;margin-bottom:6px}
#loginPage input{width:100%;height:44px;padding:0 14px;margin-bottom:16px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.18);border-radius:8px;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
#loginPage input:focus{border-color:#e94560;background:rgba(255,255,255,0.14)}
#loginPage .btn-row{display:flex;gap:14px;margin-top:4px}
#loginPage .btn-login{flex:1;height:44px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
#loginPage .btn-login:hover{background:#d63851}
#loginPage .btn-cancel{flex:1;height:44px;background:rgba(255,255,255,0.1);color:#aabbcc;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-size:16px;cursor:pointer}
#loginPage .btn-cancel:hover{background:rgba(255,255,255,0.18);color:#fff}
#loginPage .msg{text-align:center;color:#ff6b6b;font-size:13px;min-height:20px;margin-top:10px}
#loginPage .toggle-link{display:block;text-align:center;color:#8899bb;font-size:13px;margin-top:14px;cursor:pointer;text-decoration:underline}
#loginPage .toggle-link:hover{color:#e94560}

/* ========== 主界面 ========== */
#mainPage{width:100vw;height:100vh;display:flex}

/* 侧边栏 */
.sidebar{width:210px;min-width:210px;background:linear-gradient(180deg,#1a1a2e,#16213e 40%,#0f3460);display:flex;flex-direction:column;padding:20px 0 15px}
.sidebar .side-logo{text-align:center;color:#e94560;font-size:18px;font-weight:bold;padding:12px}
.sidebar .side-card{text-align:center;color:#7080a0;font-size:11px;padding:0 10px 14px}
.sidebar .side-divider{border-top:1px solid rgba(255,255,255,0.08);margin:0 14px 10px}
.sidebar .side-btn{display:block;width:calc(100% - 20px);margin:2px 10px;padding:14px 18px;text-align:left;font-size:14px;font-weight:bold;color:#b0b8c8;background:transparent;border:none;border-radius:8px;cursor:pointer}
.sidebar .side-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.sidebar .side-btn.active{background:#e94560;color:#fff}
.sidebar .flex-spacer{flex:1}
.sidebar .side-logout{display:block;width:calc(100% - 20px);margin:2px 10px;padding:14px 18px;text-align:left;font-size:14px;font-weight:bold;color:#ff6b6b;background:transparent;border:none;border-radius:8px;cursor:pointer}
.sidebar .side-logout:hover{background:rgba(255,107,107,0.15);color:#ff4444}

/* 内容区 */
.content{flex:1;background:#f0f2f5;overflow-y:auto;padding:30px 40px}
.content h2{color:#2c3e50;font-size:22px;margin-bottom:18px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px;margin-bottom:16px}
.card label{display:block;color:#888;font-size:14px;margin-bottom:6px;font-weight:500}
.card input{width:100%;height:46px;padding:0 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;margin-bottom:14px}
.card input:focus{border-color:#3498db}
.card .btn{padding:10px 24px;border:none;border-radius:8px;font-size:15px;font-weight:bold;color:#fff;cursor:pointer;margin-top:4px}
.btn-green{background:#27ae60}.btn-green:hover{background:#219a52}
.btn-orange{background:#e67e22}.btn-orange:hover{background:#d35400}
.btn-red{background:#e74c3c}.btn-red:hover{background:#c0392b}
.btn-purple{background:#8e44ad}.btn-purple:hover{background:#7d3c98}
.btn-blue{background:#3498db}.btn-blue:hover{background:#2980b9}
.result{padding:8px 0;font-size:14px;min-height:22px}
.result-ok{color:#27ae60}.result-err{color:#e74c3c}

/* 余额卡片 */
.balance-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:30px;text-align:center;color:#fff;margin-bottom:16px}
.balance-card .bal-title{color:#a0a8c0;font-size:16px}
.balance-card .bal-amount{font-size:56px;font-weight:bold;margin:8px 0}
.balance-card .bal-info{color:#7f8c8d;font-size:13px;margin-top:8px}
.admin-btns{display:flex;gap:10px}

/* ========== 响应式 ========== */
@media(max-width:700px){
  #loginPage{width:94%;padding:28px 20px}
  .sidebar{width:60px;min-width:60px}
  .sidebar .side-btn{font-size:0;padding:14px 8px;text-align:center}
  .sidebar .side-logo{font-size:14px}
  .sidebar .side-card{display:none}
  .content{padding:20px}
}
</style>
</head>
<body>

<!-- =========================== 登录页 =========================== -->
<div id="loginPage">
  <div class="logo" id="loginTitle">🏦 ATM 自助银行</div>
  <div class="subtitle" id="loginSubtitle">欢迎使用模拟ATM存取款管理系统</div>
  <label class="field-label" id="labelFirst">卡号</label>
  <input id="inputFirst" type="text" placeholder="请输入银行卡号">
  <label class="field-label">密码</label>
  <input id="inputPassword" type="password" placeholder="请输入密码">
  <div class="btn-row">
    <button class="btn-login" onclick="onLogin()">登 录</button>
    <button class="btn-cancel" onclick="clearLogin()">清 空</button>
  </div>
  <div class="msg" id="loginMsg"></div>
  <span class="toggle-link" id="toggleLink" onclick="toggleLoginMode()">🔑 管理员登录</span>
</div>

<!-- =========================== 主界面 =========================== -->
<div id="mainPage" class="hidden">
  <div class="sidebar">
    <div class="side-logo">🏦 ATM System</div>
    <div class="side-card" id="sideCardNo"></div>
    <div class="side-divider"></div>
    <button class="side-btn active" data-page="0" onclick="switchPage(0,this)">💰 余额查询</button>
    <button class="side-btn" data-page="1" onclick="switchPage(1,this)">💵 取款</button>
    <button class="side-btn" data-page="2" onclick="switchPage(2,this)">🔒 修改密码</button>
    <button class="side-btn" data-page="3" onclick="switchPage(3,this)">⚙ 管理员</button>
    <div class="flex-spacer"></div>
    <button class="side-logout" onclick="onLogout()">🚪 退卡退出</button>
  </div>
  <div class="content">
    <!-- Page 0: 余额 -->
    <div id="page0">
      <h2>账户概览</h2>
      <div class="balance-card">
        <div class="bal-title">💳 可用余额</div>
        <div class="bal-amount" id="balAmount">¥ 0.00</div>
        <div class="bal-info" id="atmInfo0"></div>
      </div>
    </div>
    <!-- Page 1: 取款 -->
    <div id="page1" class="hidden">
      <h2>取款</h2>
      <div class="card" id="wdInfo"></div>
      <div class="card">
        <label>取款金额</label>
        <input id="wdAmount" type="number" placeholder="请输入取款金额" step="0.01" min="0">
        <button class="btn btn-green" onclick="onWithdraw()">确认取款</button>
      </div>
      <div class="result" id="wdResult"></div>
    </div>
    <!-- Page 2: 修改密码 -->
    <div id="page2" class="hidden">
      <h2>修改密码</h2>
      <div class="card">
        <input id="oldPwd" type="password" placeholder="请输入原密码">
        <input id="newPwd" type="password" placeholder="请输入新密码（不少于6位）">
        <input id="cfmPwd" type="password" placeholder="请再次输入新密码">
        <button class="btn btn-orange" onclick="onChangePwd()">确认修改</button>
      </div>
      <div class="result" id="pwdResult"></div>
    </div>
    <!-- Page 3: 管理员 -->
    <div id="page3" class="hidden">
      <h2>管理员控制台</h2>
      <div class="card" id="adminATMInfo"></div>
      <div class="card">
        <label>卡号</label>
        <input id="adminCard" type="text" placeholder="输入要操作的卡号">
        <div class="admin-btns">
          <button class="btn btn-red" onclick="onAdminLock()">🔒 锁定</button>
          <button class="btn btn-green" onclick="onAdminUnlock()">🔓 解锁</button>
          <button class="btn btn-purple" onclick="onAdminAddCash()">💵 加钞</button>
        </div>
        <div style="margin-top:12px">
          <button class="btn btn-blue" onclick="onViewAll()">📋 查看所有账户</button>
        </div>
      </div>
      <div class="result" id="adminResult"></div>
    </div>
  </div>
</div>

<script>
// ==================== 数据层 ====================
const DEFAULT_ACCOUNTS = [
  {cardNo:'6222021001',password:'123456',balance:15000.00,locked:false},
  {cardNo:'6222021002',password:'123456',balance:28000.50,locked:false},
  {cardNo:'6222021003',password:'123456',balance:500.00,locked:false},
  {cardNo:'6222021004',password:'123456',balance:100000.00,locked:false},
  {cardNo:'6222021005',password:'123456',balance:0.00,locked:false},
  {cardNo:'6222021006',password:'123456',balance:35000.00,locked:false},
  {cardNo:'6222021007',password:'123456',balance:8000.00,locked:true},
  {cardNo:'6222021008',password:'123456',balance:42000.00,locked:false},
  {cardNo:'6222021009',password:'123456',balance:6500.75,locked:false},
  {cardNo:'6222021010',password:'123456',balance:20000.00,locked:false}
];

let ATM = {maxSingleWithdraw:5000,remainingCash:100000};

function load(key,def){let d=localStorage.getItem(key);return d?JSON.parse(d):def}
function save(key,v){localStorage.setItem(key,JSON.stringify(v))}

if(!localStorage.getItem('atm_accounts'))save('atm_accounts',DEFAULT_ACCOUNTS);
if(!localStorage.getItem('atm_state'))save('atm_state',ATM);
let accounts=load('atm_accounts',[]);
ATM=load('atm_state',ATM);
function reload(){accounts=load('atm_accounts',[]);ATM=load('atm_state',ATM)}
function find(cardNo){return accounts.find(a=>a.cardNo===cardNo)}

// ==================== 状态 ====================
let currentAccount=null, attemptCount=0, adminMode=false, currentPage=0, adminVerified=false;

// ==================== 辅助 ====================
function F(n){return'¥ '+n.toFixed(2)}
function show(id,text,ok){let e=document.getElementById(id);e.textContent=text;e.className='result '+(ok?'result-ok':'result-err')}
function atmInfoStr(){return'ATM单笔限额：¥'+ATM.maxSingleWithdraw+' | 机内现金：¥'+ATM.remainingCash.toFixed(2)}

// ==================== 登录模式切换 ====================
function toggleLoginMode(){
  adminMode=!adminMode;
  document.getElementById('loginTitle').textContent=adminMode?'⚙ 管理员登录':'🏦 ATM 自助银行';
  document.getElementById('loginSubtitle').textContent=adminMode?'请输入管理员账号和密码':'欢迎使用模拟ATM存取款管理系统';
  document.getElementById('labelFirst').textContent=adminMode?'管理员账号':'卡号';
  document.getElementById('inputFirst').placeholder=adminMode?'请输入管理员账号':'请输入银行卡号';
  document.getElementById('toggleLink').textContent=adminMode?'💳 返回用户登录':'🔑 管理员登录';
  clearLogin();
}

// ==================== 登录 ====================
function onLogin(){
  let first=document.getElementById('inputFirst').value.trim();
  let pwd=document.getElementById('inputPassword').value;
  let msg=document.getElementById('loginMsg');
  if(!first){msg.textContent=adminMode?'请输入管理员账号！':'请输入卡号！';return}

  // 管理员模式
  if(adminMode){
    if(first!=='admin'||pwd!=='admin123'){msg.textContent='账号或密码错误！';document.getElementById('inputPassword').value='';return}
    currentAccount=null;attemptCount=0;adminVerified=true;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('sideCardNo').textContent='⚙ 管理员';
    // 隐藏用户按钮
    document.querySelectorAll('.side-btn').forEach(b=>{let p=parseInt(b.dataset.page);if(p<3)b.style.display='none'});
    switchPage(3,document.querySelector('.side-btn[data-page="3"]'));
    updateAll();return;
  }

  // 用户模式
  let acc=find(first);
  if(!acc){msg.textContent='卡号不存在，请重新输入！';clearLogin();return}
  if(acc.locked){msg.textContent='该卡已被锁定，请联系银行处理！';return}
  attemptCount++;
  if(acc.password!==pwd){
    let r=3-attemptCount;
    if(r>0){msg.textContent='密码错误！还剩 '+r+' 次机会';document.getElementById('inputPassword').value=''}
    else{acc.locked=true;save('atm_accounts',accounts);msg.textContent='密码错误次数过多，该卡已被锁定！';document.getElementById('inputFirst').disabled=true;document.getElementById('inputPassword').disabled=true}
    return
  }
  // 成功
  attemptCount=0;currentAccount=acc;adminVerified=false;
  document.getElementById('loginMsg').textContent='';
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainPage').classList.remove('hidden');
  document.getElementById('sideCardNo').textContent='💳 '+acc.cardNo;
  // 显示所有用户按钮
  document.querySelectorAll('.side-btn').forEach(b=>b.style.display='');
  switchPage(0,document.querySelector('.side-btn[data-page="0"]'));
  updateAll();
}

function clearLogin(){
  document.getElementById('inputFirst').value='';
  document.getElementById('inputPassword').value='';
  document.getElementById('loginMsg').textContent='';
  document.getElementById('inputFirst').disabled=false;
  document.getElementById('inputPassword').disabled=false;
  document.getElementById('inputFirst').focus();
}

// ==================== 页面切换 ====================
function switchPage(idx,btn){
  // 管理员验证（用户模式下进入管理员页）
  if(idx===3&&!adminVerified&&currentAccount){
    let pwd=prompt('请输入管理员密码：');
    if(pwd!=='admin123'){if(pwd!==null)alert('管理员密码错误！');return}
    adminVerified=true;
  }
  currentPage=idx;
  document.querySelectorAll('.side-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  for(let i=0;i<=3;i++)document.getElementById('page'+i).classList.add('hidden');
  document.getElementById('page'+idx).classList.remove('hidden');
  if(idx===0)updateAll();
  if(idx===1){updateAll();document.getElementById('wdAmount').value='';show('wdResult','',true)}
  if(idx===2){document.getElementById('oldPwd').value='';document.getElementById('newPwd').value='';document.getElementById('cfmPwd').value='';show('pwdResult','',true)}
  if(idx===3){updateAll();show('adminResult','',true)}
}

// ==================== 退卡 ====================
function onLogout(){
  if(!confirm('确定要退卡退出吗？'))return;
  currentAccount=null;adminVerified=false;adminMode=false;
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  // 恢复登录界面
  document.getElementById('loginTitle').textContent='🏦 ATM 自助银行';
  document.getElementById('loginSubtitle').textContent='欢迎使用模拟ATM存取款管理系统';
  document.getElementById('labelFirst').textContent='卡号';
  document.getElementById('inputFirst').placeholder='请输入银行卡号';
  document.getElementById('toggleLink').textContent='🔑 管理员登录';
  clearLogin();
}

// ==================== 更新信息 ====================
function updateAll(){
  reload();
  if(currentAccount)currentAccount=find(currentAccount.cardNo);
  document.getElementById('balAmount').textContent=currentAccount?F(currentAccount.balance):F(0);
  let info=atmInfoStr();
  document.getElementById('atmInfo0').textContent=info;
  document.getElementById('wdInfo').innerHTML='<p>当前余额：<b style="color:#27ae60">'+F(currentAccount?currentAccount.balance:0)+'</b></p><p style="color:#888">'+info+'</p>';
  document.getElementById('adminATMInfo').innerHTML='<p>单笔最大取款：<b>¥'+ATM.maxSingleWithdraw+'</b></p><p>机内剩余现金：<b>¥'+ATM.remainingCash.toFixed(2)+'</b></p>';
}

// ==================== 取款 ====================
function onWithdraw(){
  let v=parseFloat(document.getElementById('wdAmount').value);
  if(isNaN(v)||v<=0){show('wdResult','请输入有效的取款金额！',false);return}
  if(v>ATM.maxSingleWithdraw){show('wdResult','超过单笔最大取款金额(¥'+ATM.maxSingleWithdraw+'元)！',false);return}
  if(v>ATM.remainingCash){show('wdResult','ATM机内现金不足，无法完成取款！',false);return}
  if(v>currentAccount.balance){show('wdResult','卡内余额不足！',false);return}
  ATM.remainingCash-=v;currentAccount.balance-=v;
  save('atm_state',ATM);save('atm_accounts',accounts);
  updateAll();
  show('wdResult','✅ 取款成功！已取走 '+F(v)+'\n当前余额：'+F(currentAccount.balance),true);
  document.getElementById('wdAmount').value='';
}

// ==================== 修改密码 ====================
function onChangePwd(){
  let o=document.getElementById('oldPwd').value.trim();
  let n=document.getElementById('newPwd').value.trim();
  let c=document.getElementById('cfmPwd').value.trim();
  if(!o||!n||!c){show('pwdResult','请填写所有密码字段！',false);return}
  if(currentAccount.password!==o){show('pwdResult','原密码错误！',false);return}
  if(n.length<6){show('pwdResult','新密码长度不能少于6位！',false);return}
  if(n!==c){show('pwdResult','两次输入的新密码不一致！',false);return}
  currentAccount.password=n;save('atm_accounts',accounts);
  show('pwdResult','✅ 密码修改成功！请妥善保管您的新密码。',true);
  document.getElementById('oldPwd').value='';document.getElementById('newPwd').value='';document.getElementById('cfmPwd').value='';
}

// ==================== 管理员操作 ====================
function onAdminLock(){
  let c=document.getElementById('adminCard').value.trim();
  if(!c){show('adminResult','请先输入卡号！',false);return}
  let acc=find(c);
  if(!acc){show('adminResult','未找到卡号 '+c+'！',false);return}
  acc.locked=true;save('atm_accounts',accounts);updateAll();
  show('adminResult','卡号 '+c+' 已锁定。',true);document.getElementById('adminCard').value='';
}
function onAdminUnlock(){
  let c=document.getElementById('adminCard').value.trim();
  if(!c){show('adminResult','请先输入卡号！',false);return}
  let acc=find(c);
  if(!acc){show('adminResult','未找到卡号 '+c+'！',false);return}
  acc.locked=false;save('atm_accounts',accounts);updateAll();
  show('adminResult','卡号 '+c+' 已解锁。',true);document.getElementById('adminCard').value='';
}
function onAdminAddCash(){
  let v=parseFloat(prompt('请输入加钞金额：'));
  if(isNaN(v)||v<=0)return;
  ATM.remainingCash+=v;save('atm_state',ATM);updateAll();
  show('adminResult','加钞成功！当前机内现金：'+F(ATM.remainingCash),true);
}
function onViewAll(){
  reload();
  let t='<h3 style="margin-bottom:12px">所有账户</h3><table style="width:100%;border-collapse:collapse">';
  t+='<tr style="background:#3498db;color:#fff"><th style="padding:8px">卡号</th><th>余额</th><th>状态</th></tr>';
  accounts.forEach(a=>{
    t+='<tr style="border-bottom:1px solid #eee"><td style="padding:8px">'+a.cardNo+'</td><td>'+F(a.balance)+'</td><td style="color:'+(a.locked?'#e74c3c':'#27ae60')+'">'+(a.locked?'锁定':'正常')+'</td></tr>';
  });
  t+='</table>';
  let w=window.open('','_blank','width=500,height=400');
  w.document.write('<html><head><meta charset="UTF-8"><title>账户列表</title></head><body style="font-family:sans-serif;padding:20px">'+t+'</body></html>');
}

// ==================== 键盘事件 ====================
document.getElementById('inputPassword').addEventListener('keydown',e=>{if(e.key==='Enter')onLogin()});
document.getElementById('inputFirst').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inputPassword').focus()});
document.getElementById('inputFirst').focus();
</script>
</body>
</html>
